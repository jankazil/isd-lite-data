name: isd-lite-data
channels:
  - conda-forge
dependencies:
  # Python version range aligned with pyproject.toml.
  - python>=3.11,<=3.12.9

  # Environment/package-management tools.
  - mamba
  - pip

  # Build-system requirements from pyproject.toml.
  - setuptools>=77
  - wheel

  # Runtime dependencies from pyproject.toml.
  - geopandas
  - matplotlib
  - netcdf4
  - numpy
  - pandas
  - requests
  - shapely
  - xarray

  # Development tooling from pyproject.toml [project.optional-dependencies].dev.
  - pytest
  - pytest-cov
  - ruff
  - pre-commit

  # Jupyter kernel support for the local development environment.
  - jupyter_client
  - jupyter_core
  - notebook
  - ipykernel
